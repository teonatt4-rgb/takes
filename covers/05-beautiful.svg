    <filter id="r2" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="5" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="4"/></filter>
    <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="x"/><feColorMatrix in="x" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer></filter>
  </defs>
  <rect width="600" height="600" fill="#f2c0cf"/>
