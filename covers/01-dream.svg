<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="r" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="11" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="7"/></filter>
    <filter id="r2" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="4" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"/></filter>
    <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="x"/><feColorMatrix in="x" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer></filter>
  </defs>
  <rect width="600" height="600" fill="#c3b6e6"/>
  <rect x="80" y="120" width="440" height="370" fill="#f3ead0" filter="url(#r)" transform="rotate(-1.6 300 300)"/>
  <!-- stars -->
  <g filter="url(#r2)" stroke="#e0392b" stroke-width="4" stroke-linecap="round">
    <g transform="translate(150 175)"><line x1="-16" y1="0" x2="16" y2="0"/><line x1="0" y1="-16" x2="0" y2="16"/><line x1="-11" y1="-11" x2="11" y2="11"/><line x1="-11" y1="11" x2="11" y2="-11"/></g>
    <g transform="translate(470 430)"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
  </g>
  <!-- orbit -->
  <g filter="url(#r)" fill="none" stroke="#3a55a0" stroke-width="3.5" stroke-dasharray="2 14" stroke-linecap="round">
    <ellipse cx="320" cy="320" rx="180" ry="70" transform="rotate(-20 320 320)"/>
  </g>
  <!-- planet -->
  <g filter="url(#r)">
    <circle cx="320" cy="305" r="92" fill="#f0a93f"/>
    <circle cx="320" cy="305" r="92" fill="none" stroke="#e0392b" stroke-width="4.5"/>
    <ellipse cx="320" cy="305" rx="135" ry="34" fill="none" stroke="#e0392b" stroke-width="5" transform="rotate(-20 320 305)"/>
  </g>
  <!-- small moon -->
  <g filter="url(#r2)"><circle cx="175" cy="400" r="22" fill="none" stroke="#3a55a0" stroke-width="4"/></g>
  <rect width="600" height="600" filter="url(#g)" opacity="0.5"/>
</svg>
