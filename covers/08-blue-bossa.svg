<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="r" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="71" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="7"/></filter>
    <filter id="r2" x="-20%" y="-20%" width="140%" height="140%"><feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="12" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="5"/></filter>
    <filter id="g"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="x"/><feColorMatrix in="x" type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer></filter>
  </defs>
  <rect width="600" height="600" fill="#7fb2c9"/>
  <rect x="95" y="120" width="410" height="360" fill="#f4d24a" filter="url(#r)" transform="rotate(1.4 300 300)"/>
  <!-- sun -->
  <g filter="url(#r2)" stroke="#e0392b" stroke-width="5" fill="none" stroke-linecap="round"><circle cx="430" cy="200" r="40"/><g stroke-width="5"><line x1="430" y1="135" x2="430" y2="150"/><line x1="430" y1="250" x2="430" y2="265"/><line x1="365" y1="200" x2="380" y2="200"/><line x1="480" y1="200" x2="495" y2="200"/></g></g>
  <!-- sailboat -->
  <g filter="url(#r)" fill="none" stroke="#3a55a0" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 300 l0 -110 l84 96 z"/><line x1="250" y1="300" x2="250" y2="320"/>
  </g>
  <!-- waves -->
  <g filter="url(#r2)" fill="none" stroke="#2c4a8a" stroke-width="4.5" stroke-linecap="round">
    <path d="M110 380 q40 -34 80 0 t80 0 t80 0 t80 0 t80 0"/>
    <path d="M110 430 q40 -34 80 0 t80 0 t80 0 t80 0 t80 0"/>
  </g>
  <rect width="600" height="600" filter="url(#g)" opacity="0.5"/>
</svg>
