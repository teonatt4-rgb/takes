<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="rough" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="7"/>
    </filter>
    <filter id="rough2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" result="g"/>
      <feColorMatrix in="g" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- paper ground -->
  <rect width="600" height="600" fill="#a9cdd6"/>
  <!-- pink block, rough -->
  <rect x="95" y="150" width="410" height="330" fill="#f2b8c6" filter="url(#rough)" transform="rotate(-1.5 300 300)"/>

  <!-- doodle suns -->
  <g filter="url(#rough2)" stroke="#f4d24a" stroke-width="5" fill="none" stroke-linecap="round">
    <circle cx="500" cy="120" r="34"/>
    <g stroke-width="6">
      <line x1="500" y1="60" x2="500" y2="78"/><line x1="500" y1="162" x2="500" y2="180"/>
      <line x1="440" y1="120" x2="458" y2="120"/><line x1="542" y1="120" x2="560" y2="120"/>
      <line x1="458" y1="78" x2="470" y2="90"/><line x1="530" y1="150" x2="542" y2="162"/>
      <line x1="458" y1="162" x2="470" y2="150"/><line x1="530" y1="90" x2="542" y2="78"/>
    </g>
  </g>
  <g filter="url(#rough2)" stroke="#e8ddc0" stroke-width="3" fill="none">
    <circle cx="120" cy="470" r="26"/><circle cx="120" cy="470" r="13"/>
  </g>

  <!-- table + two chairs, loose red ink -->
  <g filter="url(#rough)" stroke="#e0392b" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- left chair -->
    <path d="M120 250 q-14 90 0 170"/>
    <path d="M120 250 q40 -16 78 0"/>
    <path d="M198 250 q14 90 0 170"/>
    <path d="M120 330 q40 -12 78 0"/>
    <path d="M126 420 l-10 40 M192 420 l10 40"/>
    <!-- round table -->
    <ellipse cx="320" cy="320" rx="120" ry="44"/>
    <path d="M210 330 q-6 90 6 150 M430 330 q6 90 -6 150"/>
    <path d="M300 360 l-8 110 M340 360 l8 110"/>
    <!-- right chair -->
    <path d="M470 240 q16 96 0 180"/>
    <path d="M470 240 q44 -16 84 0"/>
    <path d="M554 240 q16 96 0 180"/>
    <path d="M470 326 q44 -12 84 0"/>
    <path d="M476 420 l-10 42 M548 420 l10 42"/>
  </g>

  <!-- two teacups on table -->
  <g filter="url(#rough2)" stroke="#3a55a0" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path d="M280 300 q0 22 22 22 q22 0 22 -22"/>
    <path d="M324 304 q14 2 12 14"/>
    <path d="M348 298 q0 20 20 20 q20 0 20 -20"/>
    <path d="M388 302 q12 2 10 12"/>
  </g>

  <!-- grain overlay -->
  <rect width="600" height="600" filter="url(#grain)" opacity="0.5"/>
</svg>
